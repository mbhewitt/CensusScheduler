services:
  database:
    build:
      context: database
      dockerfile: Dockerfile
    container_name: census-database
    image: burning-man/census-database
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    security_opt:
      - apparmor:unconfined
    expose:
      - "3306"
    volumes:
      - census-db-data:/var/lib/mysql
    restart: always
  census:
    build:
      context: client
      dockerfile: Dockerfile
    container_name: census-app
    env_file:
      - ./client/.env.production
    environment:
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD}
    security_opt:
      - apparmor:unconfined
    ports:
      - "3000:3000"
    restart: always

volumes:
  census-db-data:
